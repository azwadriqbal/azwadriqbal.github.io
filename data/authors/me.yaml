# --- Research experience ------------------------------------------------------
experience:
  - role: Research Specialist
    org: McBride Lab, Princeton University
    start: '2019-05-01'
    end: '2021-07-01'
    summary: >-
      Studied the neural and genomic basis of mosquito host preference using
      neural imaging, behavioral assays, transgenic line maintenance,
      whole-genome sequencing, and tagmentation mapping protocols.
    icon: hero/beaker

  - role: Senior Thesis Researcher
    org: Pringle Lab, Princeton University
    start: '2018-06-01'
    end: '2019-04-01'
    summary: >-
      Conducted lab and field work in Nyika National Park, Malawi, collecting
      plant specimens to build a local DNA barcode database and reconstruct
      herbivore trophic networks.
    icon: hero/globe-europe-africa

  - role: Lab Technician
    org: Ayroles Lab, Lewis-Sigler Institute for Integrative Genomics
    start: '2018-01-01'
    end: '2018-12-01'
    summary: >-
      Lead technician on a project examining the genetic basis of speciation
      between *Drosophila sechellia* and *D. simulans*.
    icon: hero/beaker

  - role: Field Technician
    org: Pringle Lab, Nyika National Park, Malawi
    start: '2017-06-01'
    end: '2017-08-01'
    summary: >-
      Collected animal fecal samples for a large-mammalian-herbivore diet and
      resource-partitioning project.
    icon: hero/globe-europe-africa

  - role: Field Technician
    org: Pringle Lab, Mpala Research Centre, Laikipia, Kenya
    start: '2016-07-01'
    end: '2016-09-01'
    summary: >-
      Conducted field experiments on the induced plant defenses of *Barleria*
      species.
    icon: hero/globe-europe-africa

